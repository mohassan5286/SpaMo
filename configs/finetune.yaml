model:
  target: spamo.t5_slt.FlanT5SLT
  
  params:     
    lr: 8.0e-4
    monitor: val/bleu4
    model_name: Qwen/Qwen2-0.5B-Instruct
    cache_dir: data3/models
    inter_hidden: 896
    input_size: 2048
    beam_size: 4
    max_frame_len: 512
    max_txt_len: 64
    frame_sample_rate: 1
    prompt: "Translate the given sentence into {}."
    tuning_type: lora
    lora_r: 32
    lora_alpha: 64
    lora_dropout: 0.05
    fusion_mode: joint
    warm_up_steps: 500
    cross_modal_align: true
    combined_loss: true
    alpha: 0.5
    use_in_context: true
    num_in_context: 1

lightning:
  callback:
    learning_rate_logger:
      target: pytorch_lightning.callbacks.LearningRateMonitor
      params:
        logging_interval: step
  trainer:
    accumulate_grad_batches: 4
    accelerator: gpu
    devices: 2
    strategy: ddp_find_unused_parameters_true
    max_epochs: 80
    gradient_clip_val: 1.0
    check_val_every_n_epoch: 4
    precision: bf16

data:
  target: dataset.datamodule.DataModuleFromConfig
  params:
    batch_size: 6
    num_workers: 4
  
    train:
      target: dataset.p14t.Phoenix14T
      params:
        anno_root: ./preprocess/Phoenix14T
        vid_root: ./dataset/Phoenix14T
        feat_root: feat_Phoenix14T
        mae_feat_root: mae_feat_Phoenix14T
        mode: train
        spatial: true
        spatiotemporal: true
        spatial_postfix: ""
        spatiotemporal_postfix: ""
        
    validation:
      target: dataset.p14t.Phoenix14T
      params:
        anno_root: ./preprocess/Phoenix14T
        vid_root: ./dataset/Phoenix14T
        feat_root: feat_Phoenix14T
        mae_feat_root: mae_feat_Phoenix14T
        mode: test
        spatial: true
        spatiotemporal: true
        spatial_postfix: ""
        spatiotemporal_postfix: ""
    
    test:
      target: dataset.p14t.Phoenix14T
      params:
        anno_root: ./preprocess/Phoenix14T
        vid_root: ./dataset/Phoenix14T
        feat_root: feat_Phoenix14T
        mae_feat_root: mae_feat_Phoenix14T
        mode: test
        spatial: true
        spatiotemporal: true
        spatial_postfix: ""
        spatiotemporal_postfix: ""