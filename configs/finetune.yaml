model:
  target: spamo.t5_slt.FlanT5SLT
  
  params:     
    lr: 5.0e-4  # Reduced from 8e-4 for more stable training
    monitor: val/bleu4
    model_name: google/gemma-3-270m-it
    cache_dir: data3/models
    inter_hidden: 640
    input_size: 2048
    beam_size: 3  # Reduced from 4 for faster validation
    max_frame_len: 512
    max_txt_len: 64
    frame_sample_rate: 1
    prompt: "Translate the sign language video into {}."  # Changed back - more accurate
    tuning_type: lora
    lora_r: 24  # Increased from 16 for better capacity
    lora_alpha: 48  # Scaled proportionally (2x lora_r)
    lora_dropout: 0.05  # Keep low dropout
    fusion_mode: joint
    warm_up_steps: 300  # Reduced from 500 for faster warmup
    cross_modal_align: true
    combined_loss: true
    alpha: 0.3  # Reduced from 0.5 to prioritize main translation loss
    use_in_context: false
    num_in_context: 0

lightning:
  callback:
    learning_rate_logger:
      target: pytorch_lightning.callbacks.LearningRateMonitor
      params:
        logging_interval: step
  trainer:
    num_sanity_val_steps: 0  # Skip sanity check for faster startup
    accumulate_grad_batches: 3  # Reduced from 4 (effective batch = 6*2*3 = 36)
    accelerator: gpu
    devices: 2
    strategy: ddp  # Good - removed find_unused_parameters for speed
    max_epochs: 30
    gradient_clip_val: 1.0
    check_val_every_n_epoch: 3  # Changed from 5 - validate more often
    precision: bf16-mixed  # Changed from bf16 for better stability

data:
  target: dataset.datamodule.DataModuleFromConfig
  params:
    batch_size: 6
    num_workers: 4
  
    train:
      target: dataset.p14t.Phoenix14T
      params:
        anno_root: ./preprocess/Phoenix14T
        vid_root: ./dataset/Phoenix14T
        feat_root: feat_Phoenix14T
        mae_feat_root: mae_feat_Phoenix14T
        mode: train
        spatial: true
        spatiotemporal: true
        spatial_postfix: ""
        spatiotemporal_postfix: ""
        
    validation:
      target: dataset.p14t.Phoenix14T
      params:
        anno_root: ./preprocess/Phoenix14T
        vid_root: ./dataset/Phoenix14T
        feat_root: feat_Phoenix14T
        mae_feat_root: mae_feat_Phoenix14T
        mode: test
        spatial: true
        spatiotemporal: true
        spatial_postfix: ""
        spatiotemporal_postfix: ""
    
    test:
      target: dataset.p14t.Phoenix14T
      params:
        anno_root: ./preprocess/Phoenix14T
        vid_root: ./dataset/Phoenix14T
        feat_root: feat_Phoenix14T
        mae_feat_root: mae_feat_ROM14T
        mode: test
        spatial: true
        spatiotemporal: true
        spatial_postfix: ""
        spatiotemporal_postfix: ""